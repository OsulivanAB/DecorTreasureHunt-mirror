name: Sync upstream and publish WowUp release (on any change)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"

permissions:
  contents: write

jobs:
  sync_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation branch (contains workflows)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Mirror upstream -> upstream (force), stripping .github/workflows
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          upstream_repo="https://github.com/Wolkenschutz/DecorTreasureHunt.git"
          upstream_branch="main"

          # Auth origin with PAT (no workflow scope needed since we won't push workflow files)
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${REPO}.git"

          # Add/fetch upstream
          if ! git remote get-url tmp_upstream >/dev/null 2>&1; then
            git remote add tmp_upstream "$upstream_repo"
          fi
          git fetch tmp_upstream "$upstream_branch" --force
          git fetch tmp_upstream --tags --force || true

          # Create a local branch from upstream tip
          git checkout -B _mirror "tmp_upstream/${upstream_branch}"

          # Strip upstream workflows so pushes don't touch .github/workflows/*
          rm -rf .github/workflows || true
          git add -A

          # If stripping changed anything, commit it; otherwise keep identical tree
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Mirror upstream (strip workflows)"
          fi

          # Force push to the mirror's upstream branch
          git push origin HEAD:upstream --force

          # Record the *true* upstream SHA and the mirror commit SHA for later steps
          upstream_sha="$(git rev-parse "tmp_upstream/${upstream_branch}")"
          mirror_sha="$(git rev-parse HEAD)"
          echo "UPSTREAM_SHA=${upstream_sha}" >> "$GITHUB_ENV"
          echo "MIRROR_SHA=${mirror_sha}" >> "$GITHUB_ENV"

      - name: Fetch updated upstream branch + tags
        run: |
          set -euo pipefail
          git fetch origin upstream --force
          git fetch --tags --force

      - name: Compute upstream commit + mirror tag
        id: meta
        run: |
          set -euo pipefail
          # Tag is based on the *real* upstream commit, even though we push a stripped mirror commit
          up_sha="${UPSTREAM_SHA}"
          short="$(printf "%s" "$up_sha" | cut -c1-8)"
          tag="upstream-${short}"
          echo "up_sha=${up_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Skip if we've already tagged this upstream commit
        id: skip
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag for this mirrored commit (PAT auth)
        if: steps.skip.outputs.skip != 'true'
        env:
          PAT: ${{ secrets.PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          mirror_sha="${MIRROR_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin "https://x-access-token:${PAT}@github.com/${REPO}.git"

          git tag -a "$tag" "$mirror_sha" -m "Mirror upstream commit ${{ steps.meta.outputs.up_sha }} (workflows stripped)"
          git push origin "refs/tags/$tag"

      - name: Check out mirrored commit into a worktree for packaging
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mirror_sha="${MIRROR_SHA}"
          git worktree add --force _pkg "$mirror_sha"

      - name: Build WowUp-compatible zip
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          addon="DecorTreasureHunt"
          rm -rf dist
          mkdir -p "dist/${addon}"

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            ./_pkg/ "dist/${addon}/"

          (cd dist && zip -r "../${addon}.zip" "${addon}")

      - name: Create GitHub Release with zip asset
        if: steps.skip.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: |
            DecorTreasureHunt.zip
